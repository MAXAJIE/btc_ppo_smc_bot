# config/config.yaml  –  Hyperparameters  (FIXED for convergence)
# =====================================================================
# Summary of changes from original:
#
#   learning_rate : 3e-4 → 1e-4
#       Reason: the observation space is 90-dim with mixed-scale features.
#       A large LR causes the policy to oscillate and never settle.
#
#   n_steps : 2048 → 4096
#       Reason: with a 4320-step episode and a sparse reward landscape,
#       2048 steps gives the critic only ~1 episode of experience per
#       update. 4096 ensures each update sees ~2 full episodes.
#
#   batch_size : 64 → 256
#       Reason: larger mini-batches reduce gradient variance for the
#       value network, which is the main source of high value-loss.
#
#   n_epochs : 10 → 5
#       Reason: fewer epochs per update avoids overfitting to the small
#       rollout buffer, which was causing the policy to update too
#       aggressively and then diverge.
#
#   clip_range : 0.2 → 0.15
#       Reason: tighter clipping keeps the policy update conservative,
#       which is critical early in training when feature representations
#       are still being learned.
#
#   ent_coef : 0.0 → 0.01
#       Reason: the original config had NO entropy bonus, causing the
#       policy to collapse to a near-deterministic "always HOLD" strategy
#       after ~100k steps.  0.01 encourages continued exploration.
#
#   vf_coef : 0.5 → 0.7
#       Reason: the value network is under-trained relative to the policy
#       because of sparse rewards.  Increasing vf_coef forces the critic
#       to receive more gradient signal per update.
#
#   gamma : 0.99 → 0.995
#       Reason: our episode is 15 days; with gamma=0.99 a reward at
#       step 500 has only e^(-5) ≈ 0.007 weight at step 1.  0.995 keeps
#       longer-term rewards visible to the critic.
#
#   gae_lambda : 0.95 → 0.97
#       Reason: with longer episodes and a less-fitted critic, higher
#       lambda (more Monte-Carlo-like returns) reduces bias.

environment:
  symbol:        "BTCUSDT"
  timeframes:    ["5m", "15m", "1h", "4h", "1d"]
  obs_dim:       90
  action_dim:    7
  episode_steps: 4320         # 15 days × 288 bars/day
  max_trade_hold_steps: 576   # 2 days max hold
  stop_loss_pct:  0.03        # hard stop -3%
  take_profit_pct: 0.06       # hard TP +6%
  kill_switch_drawdown: 0.15  # halt at -15%
  max_leverage:  3.0

ppo:
  # Core update parameters
  learning_rate:  0.0001      # was 0.0003
  n_steps:        4096        # was 2048
  batch_size:     256         # was 64
  n_epochs:       5           # was 10
  clip_range:     0.15        # was 0.2
  gamma:          0.995       # was 0.99
  gae_lambda:     0.97        # was 0.95

  # Loss coefficients
  ent_coef:       0.01        # was 0.0  ← CRITICAL FIX (prevents HOLD collapse)
  vf_coef:        0.7         # was 0.5
  max_grad_norm:  0.5

  # Network architecture
  policy:         "MlpPolicy"
  net_arch:
    pi: [256, 256, 128]       # actor
    vf: [256, 256, 128]       # critic (separate from actor)
  activation_fn:  "tanh"

  # Training schedule
  total_timesteps: 3_000_000
  checkpoint_freq: 50_000

reward:
  win_scale:              1.0
  loss_scale:             1.3   # was 2.0
  hold_penalty:           0.0001
  intra_win_scale:        0.03
  intra_loss_scale:       0.04   # was 0.10
  entry_quality_bonus:    0.08
  entry_quality_thresh:   0.5    # ATR units
  drawdown_threshold:     0.05
  drawdown_linear_k:      0.20
  drawdown_cap:           0.30

garch:
  p: 1
  q: 1
  min_fit_len: 500
  kelly_fraction: 0.25          # quarter-Kelly

data:
  hist_years: 2
  cache_dir: "./data"

logging:
  log_dir:   "./logs"
  model_dir: "./models"
