# config/config.yaml — Full unified config

environment:
  symbol:        "BTCUSDT"
  timeframes:    ["5m", "15m", "1h", "4h", "1d"]
  obs_dim:       90
  action_dim:    7
  episode_steps: 4320         # 15 days × 288 bars/day
  max_trade_hold_steps: 576   # 2 days max hold
  stop_loss_pct:  0.03        # hard stop -3%
  take_profit_pct: 0.06       # hard TP +6%
  kill_switch_drawdown: 0.15  # halt at -15%
  max_leverage:  3.0

offline:
  total_timesteps: 3_000_000
  historical_years: 2
  save_every: 50_000
  eval_episodes: 10
  tb_log_dir: "./logs/tb"

live:
  max_runtime_hours: 24.0
  walk_forward_days: 7

risk:
  max_drawdown_kill: 0.15

episode:
  candles_per_episode: 4320

symbol: "BTCUSDT"
max_leverage: 3

ppo:
  learning_rate:  0.0001
  initial_lr:     0.0003
  fine_tune_lr:   0.0001
  n_steps:        4096
  batch_size:     256
  n_epochs:       5
  clip_range:     0.15
  gamma:          0.995
  gae_lambda:     0.97
  ent_coef:       0.01
  vf_coef:        0.7
  max_grad_norm:  0.5
  policy:         "MlpPolicy"
  policy_kwargs:
    net_arch:
      pi: [256, 256, 128]
      vf: [256, 256, 128]
    activation_fn: "tanh"
  total_timesteps: 3_000_000
  checkpoint_freq: 50_000

reward:
  win_scale:              1.0
  loss_scale:             1.3
  hold_penalty:           0.0001
  intra_win_scale:        0.03
  intra_loss_scale:       0.04
  entry_quality_bonus:    0.08
  entry_quality_thresh:   0.5
  drawdown_threshold:     0.05
  drawdown_linear_k:      0.20
  drawdown_cap:           0.30

garch:
  p: 1
  q: 1
  min_fit_len: 500
  kelly_fraction: 0.25

data:
  hist_years: 2
  cache_dir: "./data"

logging:
  log_dir:   "./logs"
  model_dir: "./models"
